version: "3.9"

services:

  postgres:
    image: postgres:17-alpine
    container_name: postgres-url-shortener
    restart: always
    environment:
      POSTGRES_DB: url_shortner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 9801
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-url-shortener
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: snaplink-app
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/url_shortner
      DB_USERNAME: postgres
      DB_PASSWORD: 9801
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  postgres_data: